# split_clients hashes the client IP deterministically (same IP → same node),
# giving sticky-session behaviour without an upstream block that resolves DNS at startup.
split_clients "${remote_addr}" $game_node {
    50%  "server.railway.internal";
    *    "server2.railway.internal";
}

server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Railway private networking uses Tailscale DNS at 100.100.100.100.
    # Resolving at request time (not startup) prevents the crash when a node
    # isn't yet registered in DNS when this container first boots.
    resolver 100.100.100.100 valid=30s ipv6=off;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api {
        proxy_pass http://$game_node:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /socket.io {
        proxy_pass http://$game_node:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}