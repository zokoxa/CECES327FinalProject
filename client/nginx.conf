# split_clients hashes the client IP deterministically (same IP → same node),
# giving sticky-session behaviour without an upstream block that resolves DNS at startup.
split_clients "${http_x_forwarded_for}${remote_addr}" $game_node {
    50%  "server.railway.internal:3001";
    *    "server2.railway.internal:3002";
}

server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;
    set $primary_game_node "server.railway.internal:3001";

    # Railway private DNS is available at fd12::10. Resolving at request time
    # lets proxy_pass use split_clients without resolving both nodes at startup.
    resolver [fd12::10] valid=30s;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api {
        proxy_intercept_errors on;
        error_page 502 503 504 = @api_fallback;
        proxy_pass http://$game_node;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location @api_fallback {
        proxy_pass http://$primary_game_node;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /socket.io {
        proxy_pass http://$game_node;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
