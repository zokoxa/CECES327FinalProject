# ── Game node upstream pool ─────────────────────────────────────────────────
# ip_hash ensures each client always lands on the same node (sticky session),
# which is required for the Socket.io WebSocket upgrade handshake to succeed.
upstream game_nodes {
    ip_hash;
    server server.railway.internal:3001;
    server server2.railway.internal:3001;
}

server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — all unknown paths serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy REST calls to the node pool
    location /api {
        proxy_pass http://game_nodes;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Proxy Socket.io (WebSocket + polling) to the node pool
    # ip_hash keeps the same node for the duration of each connection
    location /socket.io {
        proxy_pass http://game_nodes;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
