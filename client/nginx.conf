# Browser traffic enters through a single stable game gateway.
# The other game node still participates internally through Redis and node forwarding.
server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;
    set $game_gateway "server.railway.internal:3001";

    # Railway private DNS is available at fd12::10. Resolving at request time
    # lets proxy_pass resolve the gateway at request time instead of startup.
    resolver [fd12::10] valid=30s;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api {
        proxy_pass http://$game_gateway;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /socket.io {
        proxy_pass http://$game_gateway;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
