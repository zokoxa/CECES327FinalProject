services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped

  chess-engine:
    build: ./chess-engine
    restart: unless-stopped
    depends_on:
      - redis

  # ── Game node 1 ──────────────────────────────────────────────────────────────
  server:
    build: ./server
    restart: unless-stopped
    environment:
      PORT: 3001
      NODE_ID: node-1
      NODE_ADDRESS: http://server:3001
      REDIS_URL: redis://redis:6379
      CHESS_ENGINE_URL: http://chess-engine:5001
      CLIENT_URL: http://localhost
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
    depends_on:
      - redis
      - chess-engine
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3001/api/health').then(r => process.exit(r.ok ? 0 : 1))"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Game node 2 ──────────────────────────────────────────────────────────────
  # A second independent game node. Handles its own games as the authoritative
  # owner; routes moves to the correct owner when receiving moves for games
  # it does not own.
  server2:
    build: ./server
    restart: unless-stopped
    environment:
      PORT: 3002
      NODE_ID: node-2
      NODE_ADDRESS: http://server2:3002
      REDIS_URL: redis://redis:6379
      CHESS_ENGINE_URL: http://chess-engine:5001
      CLIENT_URL: http://localhost
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
    depends_on:
      - redis
      - chess-engine
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3002/api/health').then(r => process.exit(r.ok ? 0 : 1))"]
      interval: 5s
      timeout: 5s
      retries: 10

  client:
    build:
      context: ./client
      args:
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL}
        VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY}
    ports:
      - "80:80"
    depends_on:
      server:
        condition: service_healthy
      server2:
        condition: service_healthy
