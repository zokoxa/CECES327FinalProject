services:

  # ── Redis master ──────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --bind 0.0.0.0 --appendonly yes

  # ── Redis replica ─────────────────────────────────────────────────────────────
  redis-replica:
    build: ./redis-replica
    restart: unless-stopped
    environment:
      REDIS_MASTER_HOST: redis
      REDIS_MASTER_PORT: 6379
    depends_on:
      - redis

  # ── Sentinels (3 required for quorum = 2) ────────────────────────────────────
  sentinel-1:
    build: ./redis-sentinel
    restart: unless-stopped
    environment:
      REDIS_MASTER_HOST: redis
      REDIS_MASTER_PORT: 6379
      SENTINEL_QUORUM: 2
    depends_on:
      - redis
      - redis-replica

  sentinel-2:
    build: ./redis-sentinel
    restart: unless-stopped
    environment:
      REDIS_MASTER_HOST: redis
      REDIS_MASTER_PORT: 6379
      SENTINEL_QUORUM: 2
    depends_on:
      - redis
      - redis-replica

  sentinel-3:
    build: ./redis-sentinel
    restart: unless-stopped
    environment:
      REDIS_MASTER_HOST: redis
      REDIS_MASTER_PORT: 6379
      SENTINEL_QUORUM: 2
    depends_on:
      - redis
      - redis-replica

  chess-engine:
    build: ./chess-engine
    restart: unless-stopped

  chess-engine-2:
    build: ./chess-engine
    restart: unless-stopped

  chess-engine-3:
    build: ./chess-engine
    restart: unless-stopped

  # ── Game node 1 ──────────────────────────────────────────────────────────────
  server:
    build: ./server
    restart: unless-stopped
    environment:
      PORT: 3001
      NODE_ID: node-1
      NODE_ADDRESS: http://server:3001
      REDIS_SENTINEL_HOSTS: sentinel-1:26379,sentinel-2:26379,sentinel-3:26379
      CHESS_ENGINE_URL: http://chess-engine:5001
      CLIENT_URL: http://localhost
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
    depends_on:
      - sentinel-1
      - sentinel-2
      - sentinel-3
      - chess-engine

    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3001/api/health').then(r => process.exit(r.ok ? 0 : 1))"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Game node 2 ──────────────────────────────────────────────────────────────
  server2:
    build: ./server
    restart: unless-stopped
    environment:
      PORT: 3002
      NODE_ID: node-2
      NODE_ADDRESS: http://server2:3002
      REDIS_SENTINEL_HOSTS: sentinel-1:26379,sentinel-2:26379,sentinel-3:26379
      CHESS_ENGINE_URL: http://chess-engine-2:5001
      CLIENT_URL: http://localhost
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
    depends_on:
      - sentinel-1
      - sentinel-2
      - sentinel-3
      - chess-engine-2
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3002/api/health').then(r => process.exit(r.ok ? 0 : 1))"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Game node 3 ──────────────────────────────────────────────────────────────
  server3:
    build: ./server
    restart: unless-stopped
    environment:
      PORT: 3003
      NODE_ID: node-3
      NODE_ADDRESS: http://server3:3003
      REDIS_SENTINEL_HOSTS: sentinel-1:26379,sentinel-2:26379,sentinel-3:26379
      CHESS_ENGINE_URL: http://chess-engine-3:5001
      CLIENT_URL: http://localhost
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
    depends_on:
      - sentinel-1
      - sentinel-2
      - sentinel-3
      - chess-engine-3
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3003/api/health').then(r => process.exit(r.ok ? 0 : 1))"]
      interval: 5s
      timeout: 5s
      retries: 10

  client:
    build:
      context: ./client
      args:
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL}
        VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY}
        VITE_SERVER_URL: ${VITE_SERVER_URL:-}
    ports:
      - "80:80"
    depends_on:
      server:
        condition: service_healthy
      server2:
        condition: service_healthy
      server3:
        condition: service_healthy
